{% extends 'base.html' %}

{% block title %}Удаление рецепта{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h3>Вы уверены, что хотите удалить рецепт "{{ recipe.title }}"?</h3>
        <p>Это действие нельзя отменить.</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'recipe_detail' recipe.id %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
